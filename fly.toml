# Lapack Lens — deploy from repo root: fly deploy -a lapack-lens
# Set secret: fly secrets set OPENAI_API_KEY=sk-... -a lapack-lens

app = "lapack-lens"

[build]
  dockerfile = "lapack-lens/Dockerfile"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true

[[vm]]
  memory = "2gb"
  # Use "4gb" if your Fly plan allows it (paid).

[env]
  GITNEXUS_URL = "http://127.0.0.1:4747"
